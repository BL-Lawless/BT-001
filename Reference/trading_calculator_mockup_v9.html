<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trading Calculator Module Mockup</title>
<style>
  :root{--bg:#fff;--panel:#f7f8fa;--border:#d9dce1;--text:#1e2329;--muted:#707a8a;--accent:#f0b90b;--green:#047857;--red:#f6465d;}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;background:#fff;font-family:Arial,Helvetica,sans-serif;color:var(--text);overflow:hidden}
  .topbar{height:46px;display:flex;align-items:center;gap:6px;padding:7px 9px;border-bottom:1px solid var(--border);background:#fff}
  select,button,input{font-size:12px;border:1px solid var(--border);border-radius:5px;padding:5px 7px;background:#f5f5f5;color:var(--text);outline:none}
  button{cursor:pointer}
  .calc-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:var(--accent);border:0;color:#111;font-weight:700}
  .chart-placeholder{height:calc(100vh - 46px);display:flex;align-items:center;justify-content:center;color:#a0a7b2;font-size:18px;background:linear-gradient(#f4f5f7 1px,transparent 1px),linear-gradient(90deg,#f4f5f7 1px,transparent 1px);background-size:64px 42px}
  .calc-window{position:fixed;left:36px;top:16px;width:560px;min-width:395px;min-height:320px;overflow:hidden;background:#fff;border:1px solid var(--border);box-shadow:0 14px 44px rgba(0,0,0,.18);border-radius:10px;z-index:20;display:flex;flex-direction:column}
  .calc-window.hidden{display:none}
  .calc-head{height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);background:#f7f8fa;cursor:move;user-select:none}
  .calc-title{font-size:13px;font-weight:800}
  .calc-actions{display:flex;gap:6px}
  .calc-actions button{width:24px;height:22px;padding:0;border:1px solid var(--border);background:#fff;font-weight:700}
  .calc-body{flex:1;min-height:0;padding:8px 10px 8px;overflow:auto}
  .calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .calc-col{border:1px solid var(--border);background:#fafafa;border-radius:8px;padding:8px 8px 7px;min-width:0}
  .col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .col-title{font-size:13px;font-weight:400;text-transform:uppercase;letter-spacing:.02em}
  .dir-switch{border:0;background:transparent;padding:0;margin:0;color:#111;font-size:13px;font-weight:400;cursor:pointer;text-transform:uppercase;letter-spacing:.02em}
  .dir-switch.long{color:#047857}
  .dir-switch.short{color:#f6465d}
  .title-sum{font-size:13px;color:#111;font-weight:400;margin-left:7px;font-variant-numeric:tabular-nums}
  .add-btn{height:24px;padding:3px 8px;background:#eef0f2;border:1px solid var(--border);color:#111;font-weight:700}
  .row-head,.calc-row{display:grid;grid-template-columns:minmax(70px,1fr) 58px 22px;gap:6px;align-items:center}
  .row-head{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
  .calc-row{margin-bottom:5px}
  .calc-row input{width:100%;min-width:0;margin:0;background:#fff;padding:5px 6px;font-size:12px}
  .remove-btn{width:22px;height:24px;padding:0;background:#fff;border:1px solid var(--border);color:#707a8a;font-weight:700}
  .stop-row{margin-top:8px;border:1px solid var(--border);background:#fafafa;border-radius:8px;padding:7px 8px;display:grid;grid-template-columns:88px minmax(70px,1fr) 92px minmax(70px,1fr);gap:8px;align-items:center}
  .stop-row label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase}
  .stop-row input{width:100%;min-width:0;background:#fff}
  .pl-table,.summary,.binance-box{margin-top:8px;border:1px solid var(--border);background:#fff;border-radius:8px;padding:8px 10px}
  .pl-title,.summary-title,.binance-title{font-size:12px;color:#111;font-weight:800;text-transform:uppercase;margin-bottom:4px}
  .pl-title,.summary-title{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
  .collapse-caret{font-size:10px;color:var(--muted);font-weight:700}
  .collapsed{display:none}
  @keyframes lotHeartbeat{0%,100%{opacity:1}45%{opacity:.38}60%{opacity:1}75%{opacity:.38}}
  .exit-title-underfilled{animation:lotHeartbeat 2.4s ease-in-out infinite}
  .summary-row{display:grid;grid-template-columns:1fr minmax(80px,max-content);align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid #f0f1f3;font-size:12px;font-weight:400}
  .summary-row:last-child{border-bottom:0}
  .summary-label{color:var(--muted);font-weight:400}
  .summary-value{font-variant-numeric:tabular-nums;color:#111;text-align:right;font-weight:400}
  .exit-pl-row .summary-label{padding-left:4px}
  .exit-pl-row .summary-value{font-size:14px}
  .binance-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .binance-actions button{height:30px;background:#eef0f2;border:1px solid var(--border);color:#111;font-weight:700}
  .resize-handle{position:absolute;z-index:3;background:transparent}
  .resize-n{top:0;left:10px;right:10px;height:6px;cursor:n-resize}
  .resize-s{bottom:0;left:10px;right:10px;height:6px;cursor:s-resize}
  .resize-e{right:0;top:10px;bottom:10px;width:6px;cursor:e-resize}
  .resize-w{left:0;top:10px;bottom:10px;width:6px;cursor:w-resize}
  .resize-ne{right:0;top:0;width:10px;height:10px;cursor:ne-resize}
  .resize-nw{left:0;top:0;width:10px;height:10px;cursor:nw-resize}
  .resize-se{right:0;bottom:0;width:12px;height:12px;cursor:se-resize}
  .resize-sw{left:0;bottom:0;width:10px;height:10px;cursor:sw-resize}
  .resize-se::after{content:"";position:absolute;right:3px;bottom:3px;width:6px;height:6px;border-right:1px solid #707a8a;border-bottom:1px solid #707a8a}
  @media(max-width:700px){.calc-window{left:10px;top:58px;width:calc(100vw - 20px);min-width:320px}.calc-grid{grid-template-columns:1fr}.stop-row{grid-template-columns:88px 1fr}}
</style>
</head>
<body>
  <div class="topbar">
    <button>⚙</button>
    <select><option>BTCUSDT</option><option selected>BTCUSDC</option></select>
    <label>TF <select><option>1m</option><option>3m</option><option>5m</option><option selected>15m</option><option>1h</option><option>4h</option></select></label>
    <button class="calc-icon" id="openCalc" title="Calculator">🧮</button>
  </div>
  <div class="chart-placeholder">App/chart remains accessible behind the floating calculator</div>
  <div class="calc-window hidden" id="calcWindow">
    <div class="resize-handle resize-n" data-resize="n"></div><div class="resize-handle resize-s" data-resize="s"></div><div class="resize-handle resize-e" data-resize="e"></div><div class="resize-handle resize-w" data-resize="w"></div><div class="resize-handle resize-ne" data-resize="ne"></div><div class="resize-handle resize-nw" data-resize="nw"></div><div class="resize-handle resize-se" data-resize="se"></div><div class="resize-handle resize-sw" data-resize="sw"></div>
    <div class="calc-head" id="calcHead">
      <div class="calc-title">Position Calculator</div>
      <div class="calc-actions"><button id="minCalc" title="Minimize">–</button><button id="closeCalc" title="Close">×</button></div>
    </div>
    <div class="calc-body" id="calcBody">
      <div class="calc-grid">
        <div class="calc-col">
          <div class="col-head"><div class="col-title"><button class="dir-switch long" id="dirSwitch" title="Click to switch Long/Short">LONG</button><span class="title-sum" id="entryTitleSum">0.000</span></div><button class="add-btn" id="addEntry">Add</button></div>
          <div class="row-head"><div>Level</div><div>Lot</div><div></div></div>
          <div id="entryRows"></div>
        </div>
        <div class="calc-col">
          <div class="col-head"><div class="col-title">EXITS <span class="title-sum" id="exitTitleSum">0.000</span></div><button class="add-btn" id="addExit">Add</button></div>
          <div class="row-head"><div>Level</div><div>Lot</div><div></div></div>
          <div id="exitRows"></div>
        </div>
      </div>
      <div class="stop-row">
        <label for="stopLevel">Stop Level</label><input id="stopLevel" type="number" inputmode="decimal" step="10" placeholder="Level">
        <label for="stopDistance">SL Distance</label><input id="stopDistance" type="number" inputmode="decimal" step="10" placeholder="Distance">
      </div>
      <div class="pl-table"><div class="pl-title" id="plTitle">PL @ Exits <span class="collapse-caret" id="plCaret">▾</span></div><div id="exitPlRows"></div></div>
      <div class="summary">
        <div class="summary-title" id="summaryTitle">Summary <span class="collapse-caret" id="summaryCaret">▾</span></div><div id="summaryBody">
        <div class="summary-row"><div class="summary-label">Total lots</div><div class="summary-value" id="entrySize">-</div></div>
        <div class="summary-row"><div class="summary-label">Average Entry</div><div class="summary-value" id="avgEntry">-</div></div>
        <div class="summary-row"><div class="summary-label">Risk</div><div class="summary-value" id="riskVal">-</div></div>
        <div class="summary-row"><div class="summary-label">Reward</div><div class="summary-value" id="rewardVal">-</div></div>
        </div>
      </div>
      <div class="binance-box">
        <div class="binance-title">Binance</div>
        <div class="binance-actions"><button id="readBinance" type="button">Read</button><button id="sendBinance" type="button">Send</button></div>
      </div>
    </div>
  </div>
<script>
(function(){
  const openBtn=document.getElementById("openCalc"),win=document.getElementById("calcWindow"),head=document.getElementById("calcHead"),closeBtn=document.getElementById("closeCalc"),minBtn=document.getElementById("minCalc"),body=document.getElementById("calcBody"),entryRows=document.getElementById("entryRows"),exitRows=document.getElementById("exitRows"),addEntry=document.getElementById("addEntry"),addExit=document.getElementById("addExit"),avgEntry=document.getElementById("avgEntry"),entrySize=document.getElementById("entrySize"),entryTitleSum=document.getElementById("entryTitleSum"),exitTitleSum=document.getElementById("exitTitleSum"),exitPlRows=document.getElementById("exitPlRows"),dirSwitch=document.getElementById("dirSwitch"),stopLevel=document.getElementById("stopLevel"),stopDistance=document.getElementById("stopDistance"),riskVal=document.getElementById("riskVal"),rewardVal=document.getElementById("rewardVal"),readBinance=document.getElementById("readBinance"),plTitle=document.getElementById("plTitle"),summaryTitle=document.getElementById("summaryTitle"),summaryBody=document.getElementById("summaryBody"),plCaret=document.getElementById("plCaret"),summaryCaret=document.getElementById("summaryCaret");
  let z=30,direction="LONG",syncingStop=false;
  function fmtPrice(v){return Number.isFinite(v)?Math.round(v).toLocaleString("en-US"):"-"}
  function fmtLot(v){return Number.isFinite(v)?Number(v.toFixed(3)).toFixed(3):"-"}
  function fmtMoney(v){return (v>0?"+":v<0?"-":"")+"$"+Math.abs(v).toFixed(2)}
  function colorFor(v){return v>0?"#047857":v<0?"#f6465d":"#111"}
  function setMoney(el,v){if(Number.isFinite(v)){el.textContent=fmtMoney(v);el.style.color=colorFor(v)}else{el.textContent="-";el.style.color="#111"}}
  function readEntry(){let qty=0,value=0;entryRows.querySelectorAll(".calc-row").forEach(row=>{const level=Number(row.querySelector(".level").value),lot=Number(row.querySelector(".lot").value);if(Number.isFinite(level)&&Number.isFinite(lot)&&lot>0){qty+=lot;value+=level*lot}});return{qty,value,avg:qty>0?value/qty:null}}
  function updateDirLabel(){dirSwitch.textContent=direction==="LONG"?"LONG":"SHORT";dirSwitch.classList.toggle("long",direction==="LONG");dirSwitch.classList.toggle("short",direction==="SHORT")}
  function updateStopFromLevel(avg){if(syncingStop)return;const sl=Number(stopLevel.value);if(Number.isFinite(avg)&&Number.isFinite(sl)){syncingStop=true;stopDistance.value=Math.abs(avg-sl).toFixed(0);syncingStop=false}}
  function updateStopFromDistance(avg){if(syncingStop)return;const dist=Number(stopDistance.value);if(Number.isFinite(avg)&&Number.isFinite(dist)){syncingStop=true;const sl=direction==="LONG"?avg-Math.abs(dist):avg+Math.abs(dist);stopLevel.value=Math.round(sl);syncingStop=false}}
  function calc(){
    const e=readEntry();let exitQty=0,total=0;const exitData=[];
    exitRows.querySelectorAll(".calc-row").forEach((row,i)=>{const level=Number(row.querySelector(".level").value),lot=Number(row.querySelector(".lot").value);if(Number.isFinite(level)&&Number.isFinite(lot)&&lot>0){exitQty+=lot;const pl=Number.isFinite(e.avg)?(direction==="LONG"?(level-e.avg)*lot:(e.avg-level)*lot):null;if(Number.isFinite(pl))total+=pl;exitData.push({i:i+1,pl})}});
    if(exitQty>e.qty&&e.qty>0){const rows=[...exitRows.querySelectorAll(".calc-row")];let remaining=e.qty;rows.forEach(row=>{const lotInput=row.querySelector(".lot");const lot=Number(lotInput.value);if(!Number.isFinite(lot)||lot<=0)return;const capped=Math.max(0,Math.min(lot,remaining));if(Math.abs(capped-lot)>1e-9)lotInput.value=capped?capped.toFixed(3):"";remaining-=capped});return calc()}
    entryTitleSum.textContent=fmtLot(e.qty||0);exitTitleSum.textContent=fmtLot(exitQty||0);entrySize.textContent=e.qty>0?fmtLot(e.qty):"-";avgEntry.textContent=e.qty>0?fmtPrice(e.avg):"-";
    exitTitleSum.classList.toggle("exit-title-underfilled",e.qty>0&&exitQty<e.qty);
    exitPlRows.innerHTML="";
    exitData.forEach(item=>{const row=document.createElement("div");row.className="summary-row exit-pl-row";row.innerHTML=`<div class="summary-label">PL @ Ex ${item.i}</div><div class="summary-value"></div>`;const val=row.querySelector(".summary-value");setMoney(val,item.pl);exitPlRows.appendChild(row)});
    setMoney(rewardVal,exitData.length?total:NaN);const sl=Number(stopLevel.value);const risk=Number.isFinite(e.avg)&&Number.isFinite(sl)&&e.qty>0?(direction==="LONG"?(sl-e.avg)*e.qty:(e.avg-sl)*e.qty):NaN;setMoney(riskVal,risk)
  }
  function addRow(container,level="",lot=""){const row=document.createElement("div");row.className="calc-row";row.innerHTML=`<input class="level" type="number" inputmode="decimal" step="10" placeholder="Level" value="${level}"><input class="lot" type="number" inputmode="decimal" step="0.001" placeholder="Lot" value="${lot}"><button class="remove-btn" title="Remove">×</button>`;row.querySelectorAll("input").forEach(input=>input.addEventListener("input",calc));row.querySelector(".remove-btn").addEventListener("click",()=>{row.remove();calc()});container.appendChild(row);calc();return row}
  function setFirstRow(container,level,lot){let row=container.querySelector(".calc-row")||addRow(container);row.querySelector(".level").value=Math.round(level);row.querySelector(".lot").value=Number(lot).toFixed(3)}
  dirSwitch.addEventListener("click",()=>{direction=direction==="LONG"?"SHORT":"LONG";updateDirLabel();const e=readEntry();updateStopFromDistance(e.avg);calc()});
  stopLevel.addEventListener("input",()=>{updateStopFromLevel(readEntry().avg);calc()});
  stopDistance.addEventListener("input",()=>{updateStopFromDistance(readEntry().avg);calc()});
  plTitle.addEventListener("click",()=>{exitPlRows.classList.toggle("collapsed");plCaret.textContent=exitPlRows.classList.contains("collapsed")?"▸":"▾"});
  summaryTitle.addEventListener("click",()=>{summaryBody.classList.toggle("collapsed");summaryCaret.textContent=summaryBody.classList.contains("collapsed")?"▸":"▾"});
  readBinance.addEventListener("click",()=>{
    // Mock only. In app integration, replace with actual open position + SL order read.
    const mock={dir:"SHORT",size:0.010,entry:75585,stop:76097};
    direction=mock.dir;updateDirLabel();setFirstRow(entryRows,mock.entry,mock.size);stopLevel.value=Math.round(mock.stop);updateStopFromLevel(readEntry().avg);calc();
  });
  openBtn.addEventListener("click",()=>{win.classList.remove("hidden");win.style.zIndex=++z});
  closeBtn.addEventListener("click",()=>win.classList.add("hidden"));
  minBtn.addEventListener("click",()=>{body.style.display=body.style.display==="none"?"block":"none"});
  addEntry.addEventListener("click",()=>addRow(entryRows));
  addExit.addEventListener("click",()=>addRow(exitRows));
  updateDirLabel(); addRow(entryRows); addRow(exitRows);

  let dragging=false,sx=0,sy=0,sl=0,st=0;
  head.addEventListener("mousedown",e=>{if(e.target.closest("button"))return;dragging=true;win.style.zIndex=++z;sx=e.clientX;sy=e.clientY;sl=win.offsetLeft;st=win.offsetTop;document.body.style.userSelect="none"});
  window.addEventListener("mousemove",e=>{if(!dragging)return;win.style.left=Math.max(0,Math.min(window.innerWidth-80,sl+e.clientX-sx))+"px";win.style.top=Math.max(46,Math.min(window.innerHeight-40,st+e.clientY-sy))+"px"});
  window.addEventListener("mouseup",()=>{dragging=false;document.body.style.userSelect=""});

  let resizing=null,rsx=0,rsy=0,rl=0,rt=0,rw=0,rh=0;
  win.querySelectorAll(".resize-handle").forEach(h=>h.addEventListener("mousedown",e=>{e.preventDefault();e.stopPropagation();resizing=h.dataset.resize;win.style.zIndex=++z;rsx=e.clientX;rsy=e.clientY;rl=win.offsetLeft;rt=win.offsetTop;rw=win.offsetWidth;rh=win.offsetHeight;document.body.style.userSelect="none"}));
  window.addEventListener("mousemove",e=>{if(!resizing)return;const dx=e.clientX-rsx,dy=e.clientY-rsy,minW=395,minH=320;let nl=rl,nt=rt,nw=rw,nh=rh;if(resizing.includes("e"))nw=Math.max(minW,rw+dx);if(resizing.includes("s"))nh=Math.max(minH,rh+dy);if(resizing.includes("w")){nw=Math.max(minW,rw-dx);nl=rl+(rw-nw)}if(resizing.includes("n")){nh=Math.max(minH,rh-dy);nt=rt+(rh-nh)}win.style.left=nl+"px";win.style.top=nt+"px";win.style.width=nw+"px";win.style.height=nh+"px"});
  window.addEventListener("mouseup",()=>{resizing=null;document.body.style.userSelect=""});
})();
</script>
</body>
</html>
